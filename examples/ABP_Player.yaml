format_version: "1.0"
metadata:
  name: "ABP_Player"
  path: "/Game/Characters/"
  skeleton: "/Game/Characters/SK_Mannequin"
  description: "Main character locomotion with walk/run/jump"

# Blueprint variables used in conditions
variables:
  Speed:
    type: float
    default: 0.0
  Direction:
    type: float
    default: 0.0
  bIsInAir:
    type: bool
    default: false
  bIsCrouching:
    type: bool
    default: false

# State machines definition
state_machines:
  Locomotion:
    position: { x: 0, y: 0 }

    # States
    states:
      - name: Idle
        position: { x: 0, y: 0 }
        animation:
          type: sequence
          asset: "/Game/Animations/Idle_Loop"

      - name: Walk
        position: { x: 200, y: 0 }
        animation:
          type: blendspace1d
          asset: "/Game/Animations/BS_Walk"
          parameters:
            Speed: Speed

      - name: Run
        position: { x: 400, y: 0 }
        animation:
          type: blendspace1d
          asset: "/Game/Animations/BS_Run"
          parameters:
            Speed: Speed

      - name: Jump_Start
        position: { x: 200, y: -150 }
        animation:
          type: montage
          asset: "/Game/Animations/Montage_Jump_Start"

      - name: Jump_Loop
        position: { x: 200, y: -300 }
        animation:
          type: sequence
          asset: "/Game/Animations/Jump_Loop"

      - name: Jump_End
        position: { x: 200, y: -450 }
        animation:
          type: montage
          asset: "/Game/Animations/Montage_Jump_End"

    # Transitions
    transitions:
      # Idle to Walk
      - from: Idle
        to: Walk
        conditions:
          - variable: Speed
            operator: greater
            value: 10
        duration: 0.2

      # Idle to Run
      - from: Idle
        to: Run
        conditions:
          - variable: Speed
            operator: greater
            value: 300
        duration: 0.25

      # Walk to Idle
      - from: Walk
        to: Idle
        conditions:
          - variable: Speed
            operator: less
            value: 10
        duration: 0.2

      # Walk to Run
      - from: Walk
        to: Run
        conditions:
          - variable: Speed
            operator: greater
            value: 300
        duration: 0.15

      # Run to Walk
      - from: Run
        to: Walk
        conditions:
          - variable: Speed
            operator: less
            value: 300
        duration: 0.2

      # Run to Idle
      - from: Run
        to: Idle
        conditions:
          - variable: Speed
            operator: less
            value: 10
        duration: 0.2

      # Ground to Jump Start
      - from: Idle
        to: Jump_Start
        conditions:
          - variable: bIsInAir
            operator: equals
            value: true
        duration: 0.0

      - from: Walk
        to: Jump_Start
        conditions:
          - variable: bIsInAir
            operator: equals
            value: true
        duration: 0.0

      - from: Run
        to: Jump_Start
        conditions:
          - variable: bIsInAir
            operator: equals
            value: true
        duration: 0.0

      # Jump flow
      - from: Jump_Start
        to: Jump_Loop
        duration: 0.0

      - from: Jump_Loop
        to: Jump_End
        conditions:
          - variable: bIsInAir
            operator: equals
            value: false

      # Land to previous ground state
      - from: Jump_End
        to: Idle
        duration: 0.15

      - from: Jump_End
        to: Walk
        duration: 0.15

      - from: Jump_End
        to: Run
        duration: 0.15

    # Entry state
    entry_state: Idle

    # Connect to output pose
    connect_to_output: true
